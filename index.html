<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ujas - GenAI Explorer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <!-- AOS (Animate On Scroll) Styles -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/aos@2.3.1/dist/aos.css"
  />

  <!-- Link to your CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header Section -->
  <header data-aos="fade-down">
    <h1>Hi, I'm Ujas</h1>
    <p class="subheading">I build creative solutions using GenAI</p>
  </header>

  <!-- Main Content / CTA Buttons -->
  <main data-aos="fade-up">
    <a href="#portfolio" class="btn">See My Work</a>
    <a href="#contact" class="btn">Contact Me</a>
  </main>

  <!-- Footer -->
  <footer data-aos="fade-in">
    <p>© 2024 Ujas. All rights reserved.</p>
    <p>
      Connect with me on
      <a href="https://linkedin.com" target="_blank">LinkedIn</a> |
      <a href="https://twitter.com" target="_blank">Twitter</a>
    </p>
  </footer>

  <!-- AOS Script -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize AOS animations
    AOS.init();
  </script>
</body>
</html>
